{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your Oriflame account</p>

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" name="email" required placeholder="your@email.com" value="{{ request.form.get('email', '') }}">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required placeholder="Enter your password">
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
          <input type="checkbox" name="remember" style="accent-color: var(--color-accent); width: 16px; height: 16px;">
          Remember me
        </label>
        <a href="#" style="font-size: 13px;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
